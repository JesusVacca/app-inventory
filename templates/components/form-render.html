{% if form %}
    <div class="grid">
        {% for field in form %}
            <div class="form__group">
                <label
                        class="form__label"
                        for="{{ field.id_for_label }}"
                        data-required="{{ field.field.required }}"
                    >
                    {{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="error__text">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
    </div>
{% endif %}
